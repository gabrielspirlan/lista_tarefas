# H2 Database para Testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=STATUS
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate - desabilita geração DDL automática (usando schema.sql)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Inicialização do schema via script SQL (sem CHECK constraints incompatíveis com H2 2.x)
spring.sql.init.mode=always

spring.jpa.properties.jakarta.persistence.validation.mode=none
spring.jpa.properties.javax.persistence.validation.mode=none
